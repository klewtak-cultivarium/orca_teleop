[project]
name = "orca_teleop"
version = "0.1.0"
description = "A teleoperation stack for the ORCA hand"
authors = [
    {name = "Maximilian Eberlein", email = "meberlein@ethz.ch"},
    {name = "Francesco Capuano", email = "capuano@robots.ox.ac.uk"}
]
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "numpy>=2.0.0,<3.0.0",
    "torch>=2.8.0",
    "pytorch-kinematics",
    "grpcio>=1.62.3",
    "protobuf>=4.25.9,<5",
    "orca_core @ git+https://github.com/orcahand/orca_core.git@91ef976cdf8206d2b937f765b1d1bce091b9e2c5",
]

[project.optional-dependencies]
test = [
    "pytest>=8.0",
]
mediapipe = [
    "mediapipe-numpy2",
    "opencv-python",
]
avp = [
    "avp-stream>=1.0,<2.0",
]
metaquest = [
    "hand-tracking-sdk>=1.1.0",
    "huggingface-hub>=0.23",
    "pyarrow>=15",
]
manus = [
    # Add manus pro-related dependencies here
]
sim = [
    "orca_sim @ git+https://github.com/orcahand/orca_sim.git@53f3e4c595d8c4d79f9adb5d69999602e4ce6f9e"
]

orca_arm = [
    "orca_arm @ git+https://github.com/fracapuano/orca_arm.git@d92e47106d282edde6230170aa6e70429a5dccea",
    "orca_sim @ git+https://github.com/orcahand/orca_sim.git@53f3e4c595d8c4d79f9adb5d69999602e4ce6f9e",
    "meshcat",
    "placo",
    "pin",
    "pin-pink",
    "quadprog",
    "yourdfpy",
    "orca_teleop[metaquest]"
]

[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/orca_teleop"]
artifacts = ["src/orca_teleop/ingress/*.proto"]

[tool.hatch.build.targets.sdist]
include = [
    "/src",
    "/tests",
    "/scripts",
    "/README.md",
]

[tool.hatch.metadata]
allow-direct-references = true

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP", "B"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
