syntax = "proto3";

package proto;

message Stamp {
    int32 sec = 1;
    int32 nanosec = 2;
}

message Header {
    Stamp stamp = 1;
    string frame_id = 2;
}

message Position {
    float x = 1;
    float y = 2;
    float z = 3;
}

message Quaternion {
    float w = 1;
    float x = 2;
    float y = 3;
    float z = 4;
}

message Pose {
    Position position = 1;
    Quaternion orientation = 2;
}

message GloveState{
    Header header = 1;
    repeated Pose left_mocap_pose = 2;
    repeated Pose right_mocap_pose = 3;
}





