optimizer:
  type: adaptive_analytical

retarget:
  huber_delta_cm: 2.0
  huber_delta_dir: 0.5
  norm_delta: 0.04
  lp_alpha: 1.0
  w_pos: 1.0
  w_dir: 10.0
  w_full_hand: 1.0
  scaling: 1.0

  segment_scaling:
    thumb: [1.0, 1.0, 1.0]
    index: [1.0, 1.03, 1.10]
    middle: [1.0, 1.0, 1.0]
    ring: [1.0, 1.0, 1.0]
    pinky: [1.05, 1.15, 1.15]

  pinch_thresholds_cm:
    index: {d1: 2.0, d2: 5.0}
    middle: {d1: 2.0, d2: 5.0}
    ring: {d1: 2.0, d2: 5.0}
    pinky: {d1: 2.0, d2: 5.0}

  mediapipe_rotation:
    x: 0.0
    y: 0.0
    z: 0.0

robot_frames:
  right:
    palm: right_palm
    fingers:
      thumb:
        pip: right_thumb_ip
        dip: right_thumb_dp
        tip: right_thumb_fingertip
      index:
        pip: right_index_pip
        dip: right_index_ip
        tip: right_index_fingertip
      middle:
        pip: right_middle_pip
        dip: right_middle_ip
        tip: right_middle_fingertip
      ring:
        pip: right_ring_pip
        dip: right_ring_ip
        tip: right_ring_fingertip
      pinky:
        pip: right_pinky_pip
        dip: right_pinky_ip
        tip: right_pinky_fingertip
  left:
    palm: left_palm
    fingers:
      thumb:
        pip: left_thumb_ip
        dip: left_thumb_dp
        tip: left_thumb_fingertip
      index:
        pip: left_index_pip
        dip: left_index_ip
        tip: left_index_fingertip
      middle:
        pip: left_middle_pip
        dip: left_middle_ip
        tip: left_middle_fingertip
      ring:
        pip: left_ring_pip
        dip: left_ring_ip
        tip: left_ring_fingertip
      pinky:
        pip: left_pinky_pip
        dip: left_pinky_ip
        tip: left_pinky_fingertip

# NOTE: the v2 URDF four-finger chains have only two joints (mcp, pip) and no
# dedicated `dip` frame, so the pip/dip retarget keypoints map onto the two
# successive joint frames that do exist: pip -> *_mcp (proximal), dip -> *_pip
# (distal). They must stay distinct — pointing both at the same frame collapses
# the full-hand position constraint into a redundant target. The thumb keeps its
# own ip/dip frames.
robot_frames_by_version:
  v2:
    right:
      palm: right_palm
      fingers:
        thumb:
          pip: right_thumb_ip
          dip: right_thumb_dip
          tip: right_thumb_fingertip
        index:
          pip: right_index_mcp
          dip: right_index_pip
          tip: right_index_fingertip
        middle:
          pip: right_middle_mcp
          dip: right_middle_pip
          tip: right_middle_fingertip
        ring:
          pip: right_ring_mcp
          dip: right_ring_pip
          tip: right_ring_fingertip
        pinky:
          pip: right_pinky_mcp
          dip: right_pinky_pip
          tip: right_pinky_fingertip
    left:
      palm: left_palm
      fingers:
        thumb:
          pip: left_thumb_ip
          dip: left_thumb_dip
          tip: left_thumb_fingertip
        index:
          pip: left_index_mcp
          dip: left_index_pip
          tip: left_index_fingertip
        middle:
          pip: left_middle_mcp
          dip: left_middle_pip
          tip: left_middle_fingertip
        ring:
          pip: left_ring_mcp
          dip: left_ring_pip
          tip: left_ring_fingertip
        pinky:
          pip: left_pinky_mcp
          dip: left_pinky_pip
          tip: left_pinky_fingertip

joint_name_aliases:
  right:
    thumb_pip: thumb_cmc
  left:
    thumb_pip: thumb_cmc
